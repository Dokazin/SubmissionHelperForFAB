site_name: Submission Helper for FAB
site_url: https://dokazin.github.io/FabSubmissionHelperDoc/
site_description: Documentation for the Submission Helper for FAB Unreal Engine plugin.
site_author: Dokazin

theme:
  name: material
  language: en
  favicon: assets/images/Icon128.png
  logo: assets/images/Icon128.png
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      title: On this page

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/nav-active.js

nav:
  - Documentation: index.md
  - Getting Started:
      - Getting Started: getting-started.md
      - Installation: installation.md
      - First Startup: first-startup.md
      - Interface Overview: interface-overview.md
  - Usage:
      - Submission Types: submission-types.md
      - Running Validation: running-validation.md
      - Results: results.md
  - Reference:
      - Validation Rules: validation-rules.md
      - Common Errors: common-errors.md
      - Troubleshooting: troubleshooting.md
      - FAQ: faq.md
      - Changelog: changelog.md
